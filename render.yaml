services:
  - type: web
    name: parrot-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: BASE_URL
        value: https://your-backend-name.onrender.com
      - key: PUBLIC_LINK_BASE_URL
        value: https://your-frontend-name.vercel.app
      - key: CORS_ORIGINS
        value: http://localhost:5173,https://your-frontend-name.vercel.app
      - key: RATE_LIMIT_REQUESTS
        value: 100
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 900
