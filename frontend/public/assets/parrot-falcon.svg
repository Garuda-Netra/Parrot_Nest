<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Parrot Falcon Head & Body -->
  
  <!-- Head -->
  <circle cx="100" cy="70" r="35" fill="#E63946"/>
  
  <!-- Crest feathers (red) -->
  <path d="M 100 30 Q 85 25 80 15 Q 85 28 100 35" fill="#C1121F"/>
  <path d="M 100 28 Q 100 15 110 10 Q 105 25 100 35" fill="#C1121F"/>
  <path d="M 108 32 Q 120 22 125 10 Q 115 30 108 38" fill="#C1121F"/>
  
  <!-- Eye -->
  <circle cx="110" cy="65" r="5" fill="#FFD60A"/>
  <circle cx="111" cy="64" r="2.5" fill="#000"/>
  
  <!-- Beak -->
  <path d="M 128 72 L 145 75 L 128 78 Z" fill="#F4A261"/>
  
  <!-- Body -->
  <ellipse cx="100" cy="120" rx="30" ry="45" fill="#E63946"/>
  
  <!-- Wing details (darker red) -->
  <path d="M 75 110 Q 65 130 70 150" stroke="#C1121F" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 80 115 Q 70 135 75 155" stroke="#C1121F" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Tail feathers (spread like falcon) -->
  <path d="M 85 160 Q 70 170 55 165" stroke="#F4A261" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 90 165 Q 80 180 65 185" stroke="#F4A261" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 100 168 Q 100 185 95 195" stroke="#F4A261" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M 110 165 Q 120 180 135 185" stroke="#F4A261" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 115 160 Q 130 170 145 165" stroke="#F4A261" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Wing accent (yellow/gold) -->
  <ellipse cx="72" cy="125" rx="8" ry="15" fill="#FFD60A" opacity="0.7"/>
  <ellipse cx="128" cy="125" rx="8" ry="15" fill="#FFD60A" opacity="0.7"/>
  
  <!-- Legs -->
  <line x1="90" y1="160" x2="85" y2="180" stroke="#704214" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="160" x2="115" y2="180" stroke="#704214" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Feet -->
  <circle cx="85" cy="182" r="3" fill="#704214"/>
  <circle cx="115" cy="182" r="3" fill="#704214"/>
  
  <!-- Highlight shine -->
  <ellipse cx="85" cy="50" rx="8" ry="12" fill="#FFFFFF" opacity="0.3"/>
</svg>